services:
  - type: web
    name: moment-companion
    runtime: node
    plan: free
    buildCommand: ""
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.6-sol
